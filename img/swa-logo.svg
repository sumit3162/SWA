    <path d="M18 0 C38 -22 66 -48 90 0" fill="none" stroke="url(#g2)" stroke-width="20" stroke-linecap="round" opacity="0.9"/>
  </g>
  <!-- text -->
  <text x="512" y="840" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="120" fill="#0B2B59">SWA</text>
  <text x="512" y="900" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="36" fill="#2A466D">Medical IoT Solutions</text>
